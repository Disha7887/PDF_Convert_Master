<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" >
    <title>PDF Genius</title>
    <link rel="icon" type="image/png" href="/favicon.png" >
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" >
    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" >
    <style>
      /* Boot loader shown before the JS bundle mounts React. React replaces the
         #root children on first render, removing this automatically. Mirrors the
         in-app processing animation (navy dot-ring on a light surface). */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
      }
      #boot-loader .ring {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 5px solid #e5e7eb;
        border-top-color: #0b1220;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-loader" aria-label="Loading">
        <div class="ring"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
