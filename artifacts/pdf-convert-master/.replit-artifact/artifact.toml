kind = "web"
previewPath = "/"
title = "PDF Convert Master"
version = "1.0.0"
id = "artifacts/pdf-convert-master"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21027

[services.development]
run = "pnpm --filter @workspace/pdf-convert-master run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-convert-master", "run", "build" ]
publicDir = "artifacts/pdf-convert-master/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21027"
BASE_PATH = "/"
